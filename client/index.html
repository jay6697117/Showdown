<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showdown - 荒野决斗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #090d1e;
      --bg-b: #0d1d3b;
      --bg-c: #1e2b55;
      --frame: #20386d;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 20% 16%, rgba(103, 173, 255, 0.3), transparent 42%),
        radial-gradient(circle at 78% 8%, rgba(131, 255, 214, 0.18), transparent 40%),
        linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 52%, var(--bg-c) 100%);
      font-family: "Rajdhani", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(150, 192, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(150, 192, 255, 0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      mix-blend-mode: screen;
    }

    canvas {
      border: 2px solid var(--frame);
      box-shadow:
        0 0 0 4px rgba(53, 81, 141, 0.4),
        0 28px 80px rgba(0, 0, 0, 0.55);
      image-rendering: pixelated;
      max-width: min(96vw, 1280px);
      max-height: min(96vh, 1280px);
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
